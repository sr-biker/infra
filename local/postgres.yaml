apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  labels:
    environment: local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
    environment: local
spec:
  replicas: 1
  strategy:
    # ReadWriteOnce volume — avoid two pods trying to mount it during a rollout.
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        environment: local
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: contacts
            - name: POSTGRES_USER
              value: contacts
            - name: POSTGRES_PASSWORD
              value: contacts
            # Postgres refuses to initdb into a non-empty mount point (kind's local-path
            # provisioner seeds a lost+found dir), so data lives in a subdirectory instead.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "contacts", "-d", "contacts"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    environment: local
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

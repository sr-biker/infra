apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keycloak.name" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  # In-memory H2 -- a second replica would have completely separate, empty state.
  # Keep this at 1 regardless of what replicaCount gets set to.
  replicas: 1
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "keycloak.labels" . | nindent 8 }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # start-dev: embedded H2 in-memory DB, no external Postgres. Not for
          # production use (data lost on every restart) -- see chart notes.
          args: ["start-dev", "--import-realm"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.admin.username | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ .Values.admin.password | quote }}
            - name: KC_HEALTH_ENABLED
              value: "true"
            # Without a fixed hostname, Keycloak's dev-mode default (relative issuer) makes
            # every token's "iss" claim match whatever Host header the client used to reach
            # it -- e.g. a token requested via the short "keycloak:8080" name (from within
            # this same namespace) gets a different "iss" than one requested via the FQDN.
            # Resource-server apps validate "iss" against one fixed issuer-uri, so this
            # broke JWT validation for tokens obtained any way other than the exact FQDN.
            # Fixing the hostname makes the issuer consistent no matter how a client reaches
            # this service.
            - name: KC_HOSTNAME
              value: "{{ include "keycloak.name" . }}.{{ .Release.Namespace }}.svc.cluster.local"
          ports:
            - name: http
              containerPort: 8080
            # Keycloak 26.x serves /health/* on a separate management interface, not the
            # app port -- probes hitting :8080/health/* 404 even though the app itself
            # started fine (confirmed via logs: "Keycloak ... started in 40.628s.
            # Listening on: http://0.0.0.0:8080. Management interface listening on
            # http://0.0.0.0:9000").
            - name: management
              containerPort: 9000
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          # Dev-mode startup (Quarkus augmentation + DB schema init + realm import) can
          # easily take 60-90s+ on a t4g.small node -- a tight livenessProbe.initialDelaySeconds
          # killed the container mid-startup before it ever became ready (SIGTERM loop,
          # never actually crash-looping on an error). startupProbe gates both
          # readiness/liveness until the app is actually up, with a generous budget
          # (30 x 10s = up to 300s) instead of guessing a fixed delay.
          startupProbe:
            httpGet:
              path: /health/started
              port: management
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: realm-import
          configMap:
            name: {{ include "keycloak.name" . }}-realm-import

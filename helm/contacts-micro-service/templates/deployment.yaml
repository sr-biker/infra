apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "contacts-micro-service.name" . }}
  labels:
    {{- include "contacts-micro-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "contacts-micro-service.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "contacts-micro-service.labels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.springProfile | quote }}
          envFrom:
            - secretRef:
                name: {{ include "contacts-micro-service.secretName" . }}
          # Liveness only checks the in-process livenessState — never Postgres — so a DB
          # outage doesn't cause Kubernetes to kill and restart otherwise-healthy pods.
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          # Readiness includes the DB check — pod stops receiving traffic (removed from the
          # Service's endpoints) while Postgres is unreachable, without being restarted.
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

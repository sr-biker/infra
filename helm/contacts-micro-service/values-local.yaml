replicaCount: 2

image:
  repository: contacts-micro-service-app
  tag: latest
  pullPolicy: IfNotPresent

springProfile: local

ingress:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Plain-text creds are fine for the local kind cluster; matches docker-compose.yml in
# contacts-micro-service. Point this at a Postgres reachable from inside kind (e.g. a
# postgres Deployment/Service in the same namespace, or host.docker.internal).
db:
  host: postgres
  port: "5432"
  name: contacts
  username: contacts
  password: contacts

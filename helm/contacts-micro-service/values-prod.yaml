replicaCount: 2

image:
  # Set to the real ECR/registry path + tag at deploy time (e.g. --set image.repository=...).
  repository: contacts-micro-service-app
  tag: latest
  pullPolicy: IfNotPresent

springProfile: prod

ingress:
  enabled: true

resources:
  requests:
    cpu: 250m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 768Mi

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 15
    periodSeconds: 5
    failureThreshold: 3

# No plain db.* values in prod — populate a Kubernetes Secret named below (out-of-band, e.g.
# synced from the rds module's Secrets Manager entry: live/prod/rds outputs
# master_user_secret_arn) with keys DB_HOST/DB_PORT/DB_NAME/DB_USERNAME/DB_PASSWORD.
db:
  existingSecret: contacts-db-credentials

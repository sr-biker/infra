replicaCount: 2

image:
  repository: contacts-micro-service
  tag: latest
  pullPolicy: IfNotPresent

# Spring profile to activate — local or prod (see application-local.yml / application-prod.yml
# in the contacts-micro-service repo).
springProfile: local

service:
  port: 8080

# Routes through an in-cluster ingress controller listening on NodePort 30080 (see
# modules/alb's ingress_node_port and live/local/kind-config.yaml) — the same NodePort a
# prod ALB target group forwards to. No host/path routing needed since this is currently
# the only workload in the cluster; catch-all on "/".
ingress:
  enabled: false
  className: nginx
  host: ""
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3

# Plain DB env vars, used when db.existingSecret is not set. Fine for local (values-local.yaml);
# prod (values-prod.yaml) sets db.existingSecret instead and leaves these unset.
db:
  host: ""
  port: "5432"
  name: ""
  username: ""
  password: ""
  # Name of a pre-existing Kubernetes Secret with DB_USERNAME/DB_PASSWORD/DB_HOST/DB_PORT/DB_NAME
  # keys. When set, this is used instead of the plain db.* values above — populate it out-of-band
  # (e.g. synced from the rds module's Secrets Manager entry) before deploying.
  existingSecret: ""
